services:
  - type: web
    name: formulario-asistencia
    runtime: node
    region: ohio
    plan: free

    buildCommand: |
      cd frontend && npm ci && npm run build && cd ../backend && npm ci && npm run build

    startCommand: node backend/dist/server.js

    envVars:
      - key: NODE_ENV
        value: production

      # ─── Base de datos (Supabase PostgreSQL) ───────────────────────
      - key: DATABASE_URL
        sync: false   # Configurar manualmente en el dashboard de Render

      - key: DIRECT_URL
        sync: false

      # ─── Supabase Storage ──────────────────────────────────────────
      - key: SUPABASE_URL
        sync: false   # Configurar manualmente en el dashboard de Render

      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false   # ⚠️ Secreto — nunca commitearlo

      # ─── JWT ───────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true   # Render genera un valor aleatorio seguro

      - key: JWT_EXPIRES_IN
        value: 8h

      # ─── Puerto (Render lo asigna automáticamente) ─────────────────
      - key: PORT
        value: 10000
