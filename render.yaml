services:
  - type: web
    name: formulario-asistencia
    runtime: node
    region: ohio  # Cambiar a oregon o frankfurt si prefieres
    plan: free

    # Render ejecuta estos comandos desde la raíz del repo
    buildCommand: |
      cd frontend && npm ci && npm run build && cd ../backend && npm ci && npm run build

    startCommand: node backend/dist/server.js

    envVars:
      - key: NODE_ENV
        value: production

      # ─── Base de datos (Supabase PostgreSQL) ───────────────────────
      - key: DATABASE_URL
        sync: false   # Se configura manualmente en el dashboard de Render

      - key: DIRECT_URL
        sync: false

      # ─── JWT ───────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true   # Render genera un valor aleatorio seguro

      - key: JWT_EXPIRES_IN
        value: 8h

      # ─── Uploads ───────────────────────────────────────────────────
      - key: UPLOAD_DIR
        value: uploads

      # ─── Puerto (Render lo asigna automáticamente) ─────────────────
      - key: PORT
        value: 10000
