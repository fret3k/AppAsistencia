services:
  - type: web
    name: formulario-asistencia
    runtime: node
    region: ohio
    plan: free

    # Render usa el build script del package.json raíz
    # que instala y compila frontend y backend
    buildCommand: npm run build
    startCommand: node backend/dist/server.js

    envVars:
      - key: NODE_ENV
        value: production

      # ─── Base de datos (Supabase PostgreSQL) ───────────────────────
      - key: DATABASE_URL
        sync: false

      - key: DIRECT_URL
        sync: false

      # ─── Supabase Storage ──────────────────────────────────────────
      - key: SUPABASE_URL
        sync: false

      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

      # ─── JWT ───────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true

      - key: JWT_EXPIRES_IN
        value: 8h

      # ─── Puerto ────────────────────────────────────────────────────
      - key: PORT
        value: 10000
